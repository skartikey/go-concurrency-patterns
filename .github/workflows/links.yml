name: Markdown Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly check catches external links that rot between PRs.
    - cron: '0 12 * * 1'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-retries 2 --retry-wait-time 30 './**/*.md'
          fail: true
